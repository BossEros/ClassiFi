services:
  semantic-service:
    build: .
    ports:
      - "8002:8001"
    volumes:
      # Mount the model file at runtime — keeps the image free of the 480 MB weight file
      - ./model:/app/model
    environment:
      MODEL_PATH: /app/model/model.bin
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
